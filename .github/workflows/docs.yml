name: Publish Sphinx Docs to GitHub Pages

on:
  # Build on pushes to main and on new tags; publish automatically.
  # Build (but do not publish) on PRs to main.
  push:
    branches:
      - main
    tags:
      - '*'  # all tags
  pull_request:
    branches:
      - main
  workflow_dispatch:   # allow manual triggering
    inputs:
      deploy:
        description: 'Deploy documentation'
        type: boolean
        required: true
        default: false

permissions:
  contents: write

defaults:
  run:
    shell: bash -l {0}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  docs:
    name: Publish documentation
    runs-on: ubuntu-latest

    steps:

      - name: Deploy Information
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true'
        run: |
          echo "The docs will be published from this workflow run."

      - name: Set timezone
        uses: szenius/set-timezone@v2.0
        with:
          timezoneLinux: "America/Chicago"

      - name: Make Temporary Directory for Sphinx content
        run: |
          echo "SRC_DIR=$(pwd)" >> ${GITHUB_ENV}
          echo "TMP_DIR=$(mktemp -d)" >> ${GITHUB_ENV}

      - name: install pandoc in the OS
        run: |
          set -vxeuo pipefail
          sudo apt-get update && \
          sudo apt-get -y install pandoc

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install our package and its requirements
        run: pip install -e .[doc] -v

      - name: Determine publish directory
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="latest"
          fi
          echo "DOC_VERSION=${VERSION}" >> ${GITHUB_ENV}
          echo "HTML_DIR=${TMP_DIR}/build/${VERSION}" >> ${GITHUB_ENV}
          echo "Publishing to: ${VERSION}"

      - name: Sphinx
        run: sphinx-build -W --keep-going -b html ./docs/source "${HTML_DIR}"

      - name: Upload Docs ZIP file as artifact
        uses: actions/upload-artifact@v7
        with:
          name: hklpy2-docs-${{ env.DOC_VERSION }}
          path: ${{ env.HTML_DIR }}

      - name: Deploy to gh-pages (main push -> latest/)
        uses: peaceiris/actions-gh-pages@v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ${{ env.HTML_DIR }}
          destination_dir: latest
          keep_files: true

      - name: Deploy to gh-pages (main push -> root, for custom domain)
        uses: peaceiris/actions-gh-pages@v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ${{ env.HTML_DIR }}
          destination_dir: .
          keep_files: true

      - name: Deploy to gh-pages (tag push -> <version>/)
        uses: peaceiris/actions-gh-pages@v4
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ${{ env.HTML_DIR }}
          destination_dir: ${{ env.DOC_VERSION }}
          keep_files: true

      - name: Update switcher.json on tag push
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          VERSION="${DOC_VERSION}"

          # Clone gh-pages to update switcher.json
          git clone --branch gh-pages --depth 1 \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            gh-pages-clone

          SWITCHER="gh-pages-clone/latest/_static/switcher.json"

          # If switcher.json doesn't exist yet, bootstrap from source
          if [ ! -f "${SWITCHER}" ]; then
            mkdir -p "$(dirname ${SWITCHER})"
            cp docs/source/_static/switcher.json "${SWITCHER}"
          fi

          # Add new version entry and mark it preferred
          python3 - <<'PYEOF'
          import json, os

          version = os.environ["VERSION"]
          switcher_path = os.environ["SWITCHER"]
          base_url = "https://blueskyproject.io/hklpy2"

          with open(switcher_path) as f:
              entries = json.load(f)

          # Remove preferred from all existing entries
          for e in entries:
              e.pop("preferred", None)

          versions = [e["version"] for e in entries]
          if version not in versions:
              # Insert after "latest" entry
              new_entry = {"version": version, "url": f"{base_url}/{version}/", "preferred": True}
              entries.insert(1, new_entry)
              print(f"Added {version} to switcher.json")
          else:
              # Mark existing entry as preferred
              for e in entries:
                  if e["version"] == version:
                      e["preferred"] = True
              print(f"{version} already in switcher.json; marked preferred")

          with open(switcher_path, "w") as f:
              json.dump(entries, f, indent=4)
          PYEOF
        env:
          SWITCHER: gh-pages-clone/latest/_static/switcher.json
          VERSION: ${{ env.DOC_VERSION }}

      - name: Commit updated switcher.json to gh-pages
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          cd gh-pages-clone
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest/_static/switcher.json
          git diff --cached --quiet || git commit -m "ci: add ${DOC_VERSION} to switcher.json"
          # Pull with rebase before pushing to avoid "fetch first" rejection
          # when the earlier gh-pages deploy step has already pushed to the branch.
          git pull --rebase origin gh-pages
          git push

      - name: Deploy on manual trigger
        uses: peaceiris/actions-gh-pages@v4
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ${{ env.HTML_DIR }}
          destination_dir: latest
          keep_files: true
